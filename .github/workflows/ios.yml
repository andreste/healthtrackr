name: iOS CI

on:
  pull_request:
    branches: [ "main" ]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-deriveddata-${{ hashFiles('healthtrackr.xcodeproj/project.pbxproj', 'healthtrackr.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-deriveddata-

      - name: Boot simulator
        run: |
          UDID=$(xcrun simctl list devices available | grep "iPhone 16" | grep -v "SE\|Plus\|Pro" | head -1 | grep -oE '[A-Z0-9-]{36}')
          echo "SIMULATOR_UDID=$UDID" >> "$GITHUB_ENV"
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b

      - name: Build for testing
        run: |
          xcodebuild build-for-testing \
            -scheme healthtrackr \
            -project healthtrackr.xcodeproj \
            -destination "id=$SIMULATOR_UDID" \
            -derivedDataPath ~/Library/Developer/Xcode/DerivedData \
            -parallel-testing-enabled YES

      - name: Run unit tests
        run: |
          xcodebuild test-without-building \
            -scheme healthtrackr \
            -project healthtrackr.xcodeproj \
            -destination "id=$SIMULATOR_UDID" \
            -derivedDataPath ~/Library/Developer/Xcode/DerivedData \
            -only-testing:healthtrackrTests \
            -parallel-testing-enabled YES \
            -test-timeouts-enabled YES

  ui-tests:
    name: UI Tests
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-deriveddata-${{ hashFiles('healthtrackr.xcodeproj/project.pbxproj', 'healthtrackr.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-deriveddata-

      - name: Boot simulator
        run: |
          UDID=$(xcrun simctl list devices available | grep "iPhone 16" | grep -v "SE\|Plus\|Pro" | head -1 | grep -oE '[A-Z0-9-]{36}')
          echo "SIMULATOR_UDID=$UDID" >> "$GITHUB_ENV"
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b

      - name: Build for testing
        run: |
          xcodebuild build-for-testing \
            -scheme healthtrackr \
            -project healthtrackr.xcodeproj \
            -destination "id=$SIMULATOR_UDID" \
            -derivedDataPath ~/Library/Developer/Xcode/DerivedData

      - name: Run UI tests
        run: |
          xcodebuild test-without-building \
            -scheme healthtrackr \
            -project healthtrackr.xcodeproj \
            -destination "id=$SIMULATOR_UDID" \
            -derivedDataPath ~/Library/Developer/Xcode/DerivedData \
            -only-testing:healthtrackrUITests \
            -test-timeouts-enabled YES
